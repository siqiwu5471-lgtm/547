*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;transition:background .5s,color .5s}
a{color:inherit;text-decoration:none}
.app{min-height:100vh;transition:background .5s}

.nav a .no{color:var(--accent);margin-right:5px}
.nav a:hover{color:var(--fg)}
.nav a.on{color:var(--fg)}
.nav a.on::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:1.5px;background:var(--accent)}
.bar-r{display:flex;align-items:center;gap:14px}
.archive{font-size:11px;letter-spacing:2px;color:var(--muted);display:flex;align-items:center;gap:8px}
.archive .ring{width:11px;height:11px;border:1.4px solid var(--muted);border-radius:50%}
.lang{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 11px;color:var(--faint);font-size:10px;letter-spacing:1px;display:flex;gap:5px;cursor:pointer;align-items:center}
.lang .sep{opacity:.4}
body.lang-en .lang [data-l=en],body.lang-zh .lang [data-l=zh]{color:var(--accent)}

/* ---------- PAGE SHELL ---------- */
.page{display:none}
.page.active{display:block;animation:fade .6s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
.wrap{max-width:1180px;margin:0 auto;padding:128px clamp(18px,4vw,46px) 90px}

/* ---------- HOME (full-bleed image + float-on-hover icon clones + fallback) ---------- */
.home-full{min-height:100vh;background:#0e0b08;overflow:hidden}
.hero-img-wrap{position:relative;width:100vw;aspect-ratio:3/2;
  background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#0e0b08}
.hs{position:absolute;border:none;background:transparent;cursor:pointer;z-index:2}
.icon-pop{position:absolute;border:none;background-color:transparent;background-repeat:no-repeat;cursor:pointer;z-index:2;transform-origin:center;transition:transform .45s cubic-bezier(.2,.8,.2,1)}
.icon-pop:hover{transform:scale(1.13) translateY(-3px);z-index:3}
.home-fallback{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.home-fallback .hf-name{font-family:var(--serif);font-size:clamp(40px,8vw,72px);letter-spacing:3px;color:var(--fg)}
.home-fallback .hf-roles{font-family:var(--serif);font-style:italic;color:var(--accent);font-size:clamp(16px,2.4vw,22px);margin-top:12px}
.home-fallback .hf-note{font-family:var(--sans);font-size:11px;letter-spacing:1.5px;color:var(--faint);margin-top:26px;max-width:330px;line-height:1.7}

/* ---------- LIGHT PAGE CONTENT ---------- */
.page-head h2{font-family:var(--serif);font-weight:500;font-size:clamp(34px,5vw,62px);line-height:1.02;letter-spacing:.5px}

.rule{height:1px;background:var(--line);margin:40px 0}
.idx{display:flex;flex-direction:column}
.row{display:flex;gap:26px;align-items:flex-start;padding:26px 0;border-top:1px solid var(--line)}
.row:first-child{border-top:none}
.thumb{position:relative;flex:0 0 auto;width:92px;height:92px;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;color:var(--gold);background:var(--card);overflow:hidden;transition:.3s}
.thumb svg{width:64%;height:64%;overflow:visible}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.row:hover .thumb{transform:translateY(-3px);border-color:var(--accent)}
.row-main{flex:1;min-width:0}
.row-main h3{font-family:var(--serif);font-size:clamp(18px,2.3vw,24px);font-weight:500;line-height:1.25}
.row-main h3 a{transition:color .25s}.row-main h3 a:hover{color:var(--accent)}
.row-venue{font-size:12.5px;color:var(--faint);margin-top:8px;letter-spacing:.3px}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tag{font-size:10.5px;letter-spacing:.5px;padding:4px 11px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
.tag.role{color:var(--accent);border-color:rgba(156,47,47,.35)}
.tag.go{color:var(--gold);cursor:pointer;transition:.25s}.tag.go:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.tag.pend{color:var(--faint)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:.3s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.08)}
.card-img{position:relative;height:180px;display:grid;place-items:center;color:var(--gold);border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(154,123,58,.08),transparent);overflow:hidden}
.card-img svg{width:74px;height:74px;overflow:visible}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.about .facts{margin-top:26px;font-size:13px;line-height:1.7;color:var(--muted);border-left:2px solid var(--accent);padding-left:16px}
.about .contact{margin-top:26px;display:flex;flex-wrap:wrap;gap:12px}

.about .contact a:hover{border-color:var(--accent);background:rgba(156,47,47,.05)}

.about-photo{aspect-ratio:3/4;border-radius:12px;background-image:var(--portrait-about);background-size:cover;background-position:center;background-color:#e3dccb;border:1px solid var(--line)}

/* ---------- LIGHTBOX ---------- */
.lb-bg{position:fixed;inset:0;z-index:1000;background:rgba(20,14,9,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s}

.lb{position:fixed;z-index:1001;left:50%;top:50%;transform:translate(-50%,-46%);width:min(560px,92vw);

.lb.open{opacity:1;transform:translate(-50%,-50%);pointer-events:auto}
.lb-inner{display:flex}
.lb-art{flex:0 0 190px;background:linear-gradient(160deg,#ece4d3,#e0d6bf);display:grid;place-items:center;color:#9a7b3a;border-right:1px solid rgba(60,50,35,.12)}
.lb-art svg{width:118px;height:118px;overflow:visible}

.lb-txt h3{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.3}
.lb-txt .ven{font-size:12px;color:#a39a89;margin-top:8px}
.lb-txt .act{display:inline-block;margin-top:20px;font-size:12px;letter-spacing:1px;padding:10px 18px;border-radius:30px;background:#9c2f2f;color:#f6efe2;transition:.25s;cursor:pointer}
.lb-txt .act:hover{background:#7d2424}
.lb-close{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(60,50,35,.2);background:none;color:#6a6052;font-size:18px;cursor:pointer;display:grid;place-items:center;transition:.25s}
.lb-close:hover{transform:rotate(90deg);border-color:#9c2f2f;color:#9c2f2f}

@media (max-width:900px){

@media (prefers-reduced-motion:reduce){*{animation:none!important;scroll-behavior:auto}}

 return "";
}
function imgOrIcon(p,cls){return p.img?`<img class="${cls||''}" loading="lazy" src="${p.img}" alt="" onerror="this.remove()">`:"";}

/* ---- HOME: full-bleed bg image + float-on-hover icon clones ---- */
function renderHome(){
 const navhs=[
  {l:1.5,t:2.5,w:13,h:5,go:"home"},{l:17,t:2.5,w:7.5,h:5,go:"home"},{l:25,t:2.5,w:9,h:5,go:"research"},
  {l:34,t:2.5,w:8.5,h:5,go:"projects"},{l:42.5,t:2.5,w:7.5,h:5,go:"writing"},{l:50,t:2.5,w:7,h:5,go:"about"},{l:90,t:2.5,w:9,h:5,go:"research"}
 ];
 const icohs=[
  {l:18,t:11,w:28,h:14},{l:17,t:34,w:25,h:14},{l:3,t:58,w:27,h:15},{l:9,t:78,w:27,h:15},
  {l:77,t:11,w:22,h:14},{l:74,t:36,w:25,h:14},{l:68,t:64,w:31,h:15}
 ];
 const nav=navhs.map(h=>`<a class="hs" data-go="${h.go}" style="left:${h.l}%;top:${h.t}%;width:${h.w}%;height:${h.h}%"></a>`).join("");
 const ico=icohs.map((h,i)=>{const bw=(10000/h.w).toFixed(2),bh=(10000/h.h).toFixed(2),bx=(h.l/(100-h.w)*100).toFixed(2),by=(h.t/(100-h.h)*100).toFixed(2);return `<button class="icon-pop" data-i="${i}" style="left:${h.l}%;top:${h.t}%;width:${h.w}%;height:${h.h}%;background-image:url('${HOME_IMG}');background-size:${bw}% ${bh}%;background-position:${bx}% ${by}%"></button>`;}).join("");
 $("#home").innerHTML=`<div class="home-full"><div class="hero-img-wrap" id="heroWrap">
   <div class="home-fallback" id="heroFb">
     <div class="hf-name">Siqi Wu</div>
     <div class="hf-roles">${D.roles.map(t).join(" · ")}</div>
     <div class="hf-note">${t(D.hfnote)}</div>
   </div>
   ${nav}${ico}
   <a class="hs" data-go="about" style="left:88%;top:85%;width:11%;height:13%"></a>
 </div></div>`;
 const im=new Image();
 im.onload=function(){const w=document.getElementById("heroWrap");if(w){w.style.aspectRatio=im.naturalWidth+"/"+im.naturalHeight;w.style.backgroundImage="url('"+HOME_IMG+"')";const fb=document.getElementById("heroFb");if(fb)fb.style.display="none";}};
 im.src=HOME_IMG;
}

function pubRow(p){
 const link=p.doi?`https://doi.org/${p.doi}`:null;
 const title=link?`<a href="${link}" target="_blank" rel="noopener">${p.title}</a>`:p.title;
 const status=p.pending?`<span class="tag pend">${t(D.ui.pending)}</span>`:`<a class="tag go" href="${link}" target="_blank" rel="noopener">DOI ↗</a>`;
 return `<div class="row"><div class="thumb">${ICON(p.key)}${imgOrIcon(p)}</div><div class="row-main">
   <h3>${title}</h3><div class="row-venue">${p.venue}</div>
   <div class="tags"><span class="tag role">${t(p.role)}</span>${status}</div></div></div>`;
}
function renderNav(){
 $("#nav").innerHTML=D.nav.map(n=>`<a data-go="${n.id}"><span class="no">${n.no}</span>${t(n.t)}</a>`).join("");
 $("#arch").querySelector("span").textContent=t(D.ui.archive);
}

 $("#research").innerHTML=`<div class="wrap"><div class="page-head"><div class="eyebrow">02 · ${t({en:"Research",zh:"研究"})}</div>

   <div class="idx">${D.research.items.map(pubRow).join("")}</div></div>`;
}

function renderAll(){renderNav();renderHome();renderResearch();renderProjects();renderWriting();renderAbout();bindIcons();markNav();}

/* ---- lightbox ---- */
function openLB(i){const o=D.icons[i];let body;
 if(o.act&&o.act.doi){
   body=`<div class="lb-art">${ICON(o.key)}</div><div class="lb-txt"><div class="cap">${t(o.cap)}</div>
     <div class="sub">${t(o.sub)}</div><h3>${o.act.title}</h3><div class="ven">${o.act.venue}</div>
     <a class="act" href="https://doi.org/${o.act.doi}" target="_blank" rel="noopener">${t(D.ui.read)}</a></div>`;
 }else{
   body=`<div class="lb-art">${ICON(o.key)}</div><div class="lb-txt"><div class="cap">${t(o.cap)}</div>
     <div class="sub">${t(o.sub)}</div><span class="act" data-go="${o.act.page}">${t(D.ui.explore)}</span></div>`;
 }
 $("#lbInner").innerHTML=body;
 $("#lbBg").classList.add("open");$("#lb").classList.add("open");
}
function closeLB(){$("#lbBg").classList.remove("open");$("#lb").classList.remove("open");}
function bindIcons(){document.querySelectorAll(".hero-img-wrap button[data-i]").forEach(b=>b.addEventListener("click",()=>openLB(+b.dataset.i)));}
$("#lbBg").addEventListener("click",closeLB);
$("#lbClose").addEventListener("click",closeLB);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLB();});

/* ---- router (pure JS — never changes the URL) ---- */
const PAGES=["home","research","projects","writing","about"];
let cur="home";
function markNav(){document.querySelectorAll(".nav a").forEach(a=>a.classList.toggle("on",a.dataset.go===cur));}
function go(id){if(!PAGES.includes(id))id="home";cur=id;
 document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.dataset.page===id));
 const app=$(".app");app.dataset.theme=id==="home"?"dark":"light";app.dataset.page=id;
 markNav();closeLB();window.scrollTo(0,0);}
document.addEventListener("click",e=>{const el=e.target.closest("[data-go]");if(el){e.preventDefault();go(el.dataset.go);}});

/* ---- language ---- */
function toggleLang(){lang=lang==="en"?"zh":"en";document.body.className=lang==="zh"?"lang-zh":"";renderAll();}
$("#langBtn").addEventListener("click",toggleLang);

/* ---- init ---- */
renderAll();
go("home");
</script>
